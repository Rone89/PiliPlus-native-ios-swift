name: Build Native iOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          mkdir -p build
          xcodebuild \
            -project PiliPlusNative.xcodeproj \
            -scheme PiliPlusNative \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$PWD/build/PiliPlusNative.xcarchive" \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package Unsigned IPA
        run: |
          chmod +x scripts/create_unsigned_ipa.sh
          ./scripts/create_unsigned_ipa.sh \
            PiliPlusNative \
            "$PWD/build/PiliPlusNative.xcarchive" \
            "$PWD/build/PiliPlusNative-unsigned.ipa"

      - name: Resolve Release Metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="ios-native-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=PiliPlus Native iOS $TAG" >> "$GITHUB_OUTPUT"

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlusNative-unsigned-ipa
          path: build/PiliPlusNative-unsigned.ipa

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="${{ steps.meta.outputs.title }}"
          ASSET="build/PiliPlusNative-unsigned.ipa"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "$TITLE" \
              --notes "Swift native iOS build generated by GitHub Actions. Asset is an unsigned IPA."
          fi

